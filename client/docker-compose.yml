version: '3.8'

services:
  client-dev:
    build:
      context: .
      target: development
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - '5173:5173'
    environment:
      - CHOKIDAR_USEPOLLING=true
    networks:
      - app-network

  client-prod:
    build:
      context: .
      target: production
    ports:
      - '8080:80'
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
