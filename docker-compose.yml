version: '3.8'

services:
  client:
    build:
      context: ./client
      target: development
    volumes:
      - ./client:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    networks:
      - app-network

  server:
    build:
      context: ./server
      target: development
    volumes:
      - ./server:/app
      - ~/.m2:/root/.m2
    ports:
      - "8086:8086"
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
