version: '3.8'

services:
  client:
    build:
      context: ./client
      target: development
    volumes:
      - ./client:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      - server
    networks:
      - app-network

  server:
    build:
      context: ./server
    volumes:
      - ./server:/app
      - grantflow-uploads:/app/uploads
    ports:
      - "8086:8086"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - SECRET_KEY=${SECRET_KEY:-supersecretkey_change_in_production}
      - DATABASE_URL=sqlite:///./grantflow.db
      - UPLOAD_DIR=./uploads
      - ACCESS_TOKEN_EXPIRE_MINUTES=1440
    networks:
      - app-network

volumes:
  grantflow-uploads:

networks:
  app-network:
    driver: bridge
