spring.application.name=hackathon
server.port=8086

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hackathon}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:argusadmin}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# Redis Configuration
spring.data.redis.host=${SPRING_DATA_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}

# ── AI Configuration ──────────────────────────────────────────────────────────
# LLM Provider
ai.llm.provider=anthropic
ai.llm.api-key=${AI_API_KEY:}
ai.llm.default-model=claude-sonnet-4-6
ai.llm.base-url=https://api.anthropic.com
ai.llm.anthropic-version=2023-06-01

# Per-task prompt overrides (DB takes priority over these if a row exists in prompt_templates)
# Syntax: ai.prompts.<taskType>.system-prompt / .model / .max-tokens / .temperature
ai.prompts.SCREENING.model=claude-sonnet-4-6
ai.prompts.SCREENING.max-tokens=2048
ai.prompts.SCREENING.temperature=0.2

ai.prompts.SUMMARIZATION.model=claude-haiku-4-5
ai.prompts.SUMMARIZATION.max-tokens=1024
ai.prompts.SUMMARIZATION.temperature=0.2

ai.prompts.REVIEWER_SCORING.model=claude-sonnet-4-6
ai.prompts.REVIEWER_SCORING.max-tokens=2048
ai.prompts.REVIEWER_SCORING.temperature=0.1

ai.prompts.POST_GRANT_REPORT.model=claude-sonnet-4-6
ai.prompts.POST_GRANT_REPORT.max-tokens=2048
ai.prompts.POST_GRANT_REPORT.temperature=0.2

ai.prompts.CHATBOT.model=claude-haiku-4-5
ai.prompts.CHATBOT.max-tokens=1024
ai.prompts.CHATBOT.temperature=0.5
